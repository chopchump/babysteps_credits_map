<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Baby Steps - Animated Path</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #111;
            color: #ddd;
            font-family: monospace;
            overflow-x: hidden;
            scrollbar-gutter: stable;
        }

        /* ── Controls bar ─────────────────────────────────────────────────── */
        #controls {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            z-index: 100;
            background: rgba(15,15,25,0.96);
            border-top: 1px solid #333;
            padding: 10px 16px 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            backdrop-filter: blur(4px);
        }
        #row-top {
            display: flex;
            align-items: center;
            gap: 18px;
            flex-wrap: wrap;
        }
        #row-progress {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .group {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .group label {
            font-size: 10px;
            letter-spacing: 0.08em;
            color: #888;
            text-transform: uppercase;
        }
        .btn {
            background: #c4509a; color: #fff; border: none;
            padding: 6px 18px; font-family: monospace; font-size: 14px;
            font-weight: bold; cursor: pointer; border-radius: 3px;
            white-space: nowrap; align-self: flex-end;
        }
        .btn:hover:not(:disabled) { background: #e060b0; }
        .btn:disabled { background: #333; color: #666; cursor: default; }

        input[type=file] { font-size: 11px; color: #bbb; max-width: 200px; }
        input[type=range] { accent-color: #ff76c6; cursor: pointer; }
        #speed-range { width: 100px; }
        #progress-range { flex: 1; height: 6px; }

        #status {
            font-size: 11px; color: #777;
            align-self: center; white-space: nowrap;
        }
        .check-row {
            display: flex; align-items: center; gap: 5px;
            font-size: 12px; color: #aaa; cursor: pointer; white-space: nowrap;
        }
        .check-row input { accent-color: #ff76c6; cursor: pointer; }

        /* ── 2D viewer ────────────────────────────────────────────────────── */
        #viewer {
            position: relative;
            width: 100%;
            cursor: grab;
            user-select: none;
        }
        #viewer.dragging { cursor: grabbing; }
        #path-canvas {
            display: block; width: 100%; height: auto;
            background: #1a1a1a;
        }
        #darkening-canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            mix-blend-mode: multiply;
        }
        #overlay-canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            mix-blend-mode: multiply;
        }
        body { padding-bottom: 90px; }

        /* ── 3D viewer ────────────────────────────────────────────────────── */
        #view-3d {
            display: none;
            position: fixed;
            inset: 0;
        }

        /* ── Misc links ───────────────────────────────────────────────────── */
        #repo-link {
            position: fixed; top: 10px; right: 12px;
            z-index: 101; font-size: 11px; color: #444;
            text-decoration: none; font-family: monospace;
        }
        #repo-link:hover { color: #888; }

        /* ── Modal ────────────────────────────────────────────────────────── */
        #sav-modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.6); z-index: 200;
            align-items: center; justify-content: center;
        }
        #sav-modal-overlay.show { display: flex; }
        #sav-modal {
            background: #1a1a2e; border: 1px solid #444; border-radius: 6px;
            padding: 28px 32px; max-width: 480px; width: 90%;
            color: #ddd; font-family: monospace;
        }
        #sav-modal h2 { color: #ff76c6; font-size: 16px; margin-bottom: 16px; }
        #sav-modal ol { padding-left: 20px; line-height: 2; font-size: 13px; }
        #sav-modal code { color: #aaa; background: #111; padding: 1px 5px; border-radius: 3px; }
        .copy-path {
            background: none; border: none; color: #ff76c6; font-size: 12px;
            font-family: monospace; cursor: pointer; padding: 0;
            text-decoration: underline dotted; display: inline;
        }
        .copy-path:hover { color: #ff9ad6; }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .btn-cancel { background: #333; color: #aaa; }
        .btn-cancel:hover { background: #444; color: #ccc; }
    </style>
</head>
<body>

<a id="repo-link" href="https://github.com/chopchump/babysteps_credits_map" target="_blank">source</a>

<!-- 2D view -->
<div id="viewer">
    <canvas id="path-canvas"      width="2048" height="12288"></canvas>
    <canvas id="darkening-canvas" width="2048" height="12288"></canvas>
    <canvas id="overlay-canvas"   width="2048" height="12288"></canvas>
</div>

<!-- 3D view (Three.js renderer inserted here on first use) -->
<div id="view-3d"></div>

<div id="controls">
    <div id="row-top">
        <div class="group">
            <label>Load your own path</label>
            <button class="btn" id="loadSavBtn">Choose file…</button>
            <input type="file" id="pathInput" accept=".sav" style="display:none">
        </div>

        <button class="btn" id="playPauseBtn" disabled>▶ Play</button>

        <div class="group">
            <label>Speed: <span id="speedLabel">100× real-time</span></label>
            <input type="range" id="speed-range" min="1" max="100" value="67">
        </div>

        <label class="check-row">
            <input type="checkbox" id="cylinderToggle">
            Cylinder
        </label>

        <label class="check-row" id="autoScrollRow">
            <input type="checkbox" id="autoScroll" checked>
            Auto-scroll
        </label>

        <label class="check-row" id="annotationsRow">
            <input type="checkbox" id="annotationsToggle">
            Annotations
        </label>

        <div id="status">Loading…</div>
    </div>

    <div id="row-progress">
        <span style="font-size:11px;color:#666;white-space:nowrap;">Progress</span>
        <input type="range" id="progress-range" min="0" max="10000" value="0" step="1" disabled>
        <span id="progress-label" style="font-size:11px;color:#666;white-space:nowrap;min-width:100px;text-align:right;">0 / 0</span>
    </div>
</div>

<div id="sav-modal-overlay" onclick="closeSavModal()">
    <div id="sav-modal" onclick="event.stopPropagation()">
        <h2>Where to find your path file on PC</h2>
        <ol>
            <li>Open this folder:<br>
                <button class="copy-path" id="copyPathBtn">📋 %USERPROFILE%\AppData\LocalLow\DefaultCompany\BabySteps</button>
            </li>
            <li>Open the numbered folder inside (your Steam ID)</li>
            <li>Open the <code>save</code> folder</li>
            <li>Pick file according to your save slot:<br>
                <code>path0_0.sav</code> · <code>path1_0.sav</code> · <code>path2_0.sav</code>
            </li>
        </ol>
        <div class="modal-btns">
            <button class="btn" id="modalBrowseBtn">Browse for file</button>
            <button class="btn btn-cancel" onclick="closeSavModal()">Cancel</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── Shared constants ───────────────────────────────────────────────────────
const CANVAS_W = 2048, CANVAS_H = 12288;
const COEFF = 1.3250;
const X_PADDING = 150, Y_PADDING = 180;
const SECS_PER_POINT = 5.3;

// 2D dot style
const DOT_RADIUS = 5, CUR_RADIUS = 11;
let dotAlpha = 0.9, layerStrength = 0.03;

// 3D geometry
const WORLD_WRAP    = 32768;
const X_WORLD_MIN   = X_PADDING;
const X_WORLD_RANGE = WORLD_WRAP * 1.005 * COEFF / 25;   // ≈1745 canvas px
const CYL_RADIUS    = 5;
const CYL_HEIGHT    = CYL_RADIUS * 2 * Math.PI * (CANVAS_H / X_WORLD_RANGE);
const DOT_RAISE     = 0.01;   // base radial raise for first disc layer
const IND_RAISE     = 0.25;   // must exceed max trail raise (0.01 + 24×0.008 = 0.202)
const LAYER_STEP    = 0.008;  // radial gap between successive overlap layers

// 3D dot radii derived from 2D pixel sizes so they match visually
const PX_TO_3D = (2 * Math.PI * CYL_RADIUS) / X_WORLD_RANGE;  // canvas px → world units
const TRAIL_R  = DOT_RADIUS * PX_TO_3D;   // ≈ 0.090
const IND_R    = CUR_RADIUS * PX_TO_3D;   // ≈ 0.198

// ── Speed helpers (log-scale slider 1–100 → 1×–1000× real-time) ───────────
function sliderToSpeed(v) { return Math.pow(1000, (v - 1) / 99) / SECS_PER_POINT; }
function fmtMult(s) {
    const x = s * SECS_PER_POINT;
    return (x >= 10 ? Math.round(x) : x.toFixed(1)) + '×';
}
function fmtEta(s, rem) {
    if (!rem || !s) return '';
    const t = Math.round(rem / s);
    return t < 60 ? `~${t}s` : t < 3600 ? `~${Math.round(t/60)}min` : `~${(t/3600).toFixed(1)}hr`;
}

// ── Shared state ───────────────────────────────────────────────────────────
let coords = [], currentIdx = 0, animating = false;
let speed = sliderToSpeed(67), ptsAccum = 0, lastTs = null;
let cylMode = false;

// ── Coordinate helpers ─────────────────────────────────────────────────────
function normalize([rx, ry]) {
    return [
        (rx * 1.005 * COEFF / 25) + X_PADDING,
        ((CANVAS_H * 5 - ry * 0.983 * COEFF) / 5) + Y_PADDING
    ];
}
function parseSavBuffer(buf) {
    const arr = new Uint8Array(buf);
    const result = [];
    for (let i = 0; i < arr.length; i += 4) {
        if (arr[i] !== 0) {
            let x = (arr[i+1] << 8) + arr[i];
            if (x > 0x8000) x -= 0x8000;
            result.push([x, (arr[i+3] << 8) + arr[i+2]]);
        }
    }
    return result;
}

// ═══════════════════════════════════════════════════════════════════════════
// 2-D rendering
// ═══════════════════════════════════════════════════════════════════════════
const pathCanvas      = document.getElementById('path-canvas');
const darkeningCanvas = document.getElementById('darkening-canvas');
const overlayCanvas   = document.getElementById('overlay-canvas');
const pCtx  = pathCanvas.getContext('2d');
const dkCtx = darkeningCanvas.getContext('2d');
const oCtx  = overlayCanvas.getContext('2d');

const bgImages = { base: null, markers: null };
let showAnnotations = false;

function loadBg(key, src) {
    const img = new Image();
    img.onload = () => {
        bgImages[key] = img;
        if (!cylMode) {
            clearCanvas();
            if (coords.length > 0 && currentIdx > 0) batchDraw(0, currentIdx);
        }
    };
    img.src = src;
}
loadBg('base',    'map-base.jpg');
loadBg('markers', 'map-markers.png');

function drawBackground() {
    pCtx.globalCompositeOperation = 'source-over';
    if (bgImages.base) {
        pCtx.drawImage(bgImages.base, 0, 0, CANVAS_W, CANVAS_H);
    } else {
        pCtx.fillStyle = '#c8a87a';
        pCtx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    }
    if (showAnnotations && bgImages.markers) {
        pCtx.drawImage(bgImages.markers, 0, 0, CANVAS_W, CANVAS_H);
    }
}

function clearCanvas() {
    pCtx.clearRect(0, 0, CANVAS_W, CANVAS_H);
    drawBackground();
    dkCtx.clearRect(0, 0, CANVAS_W, CANVAS_H);
}

function batchDraw(startIdx, endIdx) {
    if (endIdx <= startIdx) return;
    pCtx.fillStyle = `rgba(140, 14, 6, ${dotAlpha})`;
    for (let i = startIdx; i < endIdx; i++) {
        const [x, y] = normalize(coords[i]);
        pCtx.beginPath();
        pCtx.arc(x, y, DOT_RADIUS, 0, Math.PI * 2);
        pCtx.fill();
    }
    if (layerStrength > 0) {
        dkCtx.fillStyle = `rgba(0, 0, 0, ${layerStrength})`;
        for (let i = startIdx; i < endIdx; i++) {
            const [x, y] = normalize(coords[i]);
            dkCtx.beginPath();
            dkCtx.arc(x, y, DOT_RADIUS, 0, Math.PI * 2);
            dkCtx.fill();
        }
    }
}

function drawDotAt(x, y) {
    oCtx.clearRect(0, 0, CANVAS_W, CANVAS_H);
    oCtx.fillStyle = `rgba(140, 14, 6, ${dotAlpha})`;
    oCtx.beginPath();
    oCtx.arc(x, y, CUR_RADIUS, 0, Math.PI * 2);
    oCtx.fill();
}

function drawIndicator2D() {
    if (currentIdx <= 0 || currentIdx >= coords.length) return;
    const i1 = Math.min(currentIdx + 1, coords.length - 1);
    const [x0, y0] = normalize(coords[currentIdx]);
    const [x1, y1] = normalize(coords[i1]);
    const t = Math.abs(x1 - x0) > 1000 ? 0 : ptsAccum;
    drawDotAt(x0 + (x1 - x0) * t, y0 + (y1 - y0) * t);
}

function drawDot(idx) {
    if (idx <= 0 || idx >= coords.length) { oCtx.clearRect(0, 0, CANVAS_W, CANVAS_H); return; }
    const [x, y] = normalize(coords[idx]);
    drawDotAt(x, y);
}

// Auto-scroll
const SCROLL_LERP = 0.08, DEAD_ZONE_2D = 0.35;
let targetScrollY = null;
function displayScale() { return pathCanvas.clientWidth / CANVAS_W; }

function setScrollTarget(idx) {
    if (!document.getElementById('autoScroll').checked || idx <= 0) return;
    const [, y] = normalize(coords[idx]);
    const dotCssY  = y * displayScale();
    const viewH    = window.innerHeight;
    const dotViewY = dotCssY - window.scrollY;
    const top      = viewH * (0.5 - DEAD_ZONE_2D / 2);
    const bot      = viewH * (0.5 + DEAD_ZONE_2D / 2);
    if      (dotViewY < top) targetScrollY = dotCssY - top;
    else if (dotViewY > bot) targetScrollY = dotCssY - bot;
}

function smoothScroll() {
    if (targetScrollY === null || !document.getElementById('autoScroll').checked) return;
    window.scrollTo({ top: window.scrollY + (targetScrollY - window.scrollY) * SCROLL_LERP, behavior: 'instant' });
}

// 2D animation loop
let rafId = null;
function animFrame(ts) {
    if (!animating) return;
    if (lastTs === null) lastTs = ts;
    const elapsed = Math.min(ts - lastTs, 100);
    lastTs = ts;
    ptsAccum += speed * elapsed / 1000;
    const ptsToDraw = Math.floor(ptsAccum);
    ptsAccum -= ptsToDraw;
    if (ptsToDraw > 0) {
        const end = Math.min(currentIdx + ptsToDraw, coords.length);
        batchDraw(currentIdx, Math.min(end + 1, coords.length));
        currentIdx = end;
    }
    if (currentIdx >= coords.length) {
        oCtx.clearRect(0, 0, CANVAS_W, CANVAS_H);
        animating = false;
        playPauseBtn.textContent = '▶ Play';
    } else {
        drawIndicator2D();
        setScrollTarget(currentIdx);
        smoothScroll();
        rafId = requestAnimationFrame(animFrame);
    }
    updateUI();
}

// 2D drag-to-pan
const viewer = document.getElementById('viewer');
let dragging2d = false, dragStartX, dragStartY, scrollStartX, scrollStartY;
viewer.addEventListener('mousedown', e => {
    if (cylMode) return;
    dragging2d = true; viewer.classList.add('dragging');
    dragStartX = e.clientX; dragStartY = e.clientY;
    scrollStartX = window.scrollX; scrollStartY = window.scrollY;
    e.preventDefault();
});
document.addEventListener('mouseup', () => { dragging2d = false; viewer.classList.remove('dragging'); });
document.addEventListener('mousemove', e => {
    if (!dragging2d || cylMode) return;
    window.scrollTo({ left: scrollStartX - (e.clientX - dragStartX), top: scrollStartY - (e.clientY - dragStartY), behavior: 'auto' });
});

// ═══════════════════════════════════════════════════════════════════════════
// 3-D rendering (lazy-initialized on first cylinder toggle)
// ═══════════════════════════════════════════════════════════════════════════
let cyl = null;   // all Three.js state lives here after initCylinder()

function canvasTo3D(cx, cy) {
    const θ = ((cx - X_WORLD_MIN) / X_WORLD_RANGE) * Math.PI * 2;
    const h = (0.5 - cy / CANVAS_H) * CYL_HEIGHT;
    return [Math.sin(θ) * CYL_RADIUS, h, Math.cos(θ) * CYL_RADIUS];
}
function raisePoint(x, y, z, amount) {
    const s = (CYL_RADIUS + amount) / CYL_RADIUS;
    return [x * s, y, z * s];
}

function initCylinder() {
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0e0e16);
    scene.fog = new THREE.Fog(0x0e0e16, CYL_RADIUS * 12, CYL_RADIUS * 20);

    const CAM_FOV = 45;
    const camera  = new THREE.PerspectiveCamera(CAM_FOV, innerWidth / innerHeight, 0.01, 500);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);
    document.getElementById('view-3d').appendChild(renderer.domElement);

    window.addEventListener('resize', () => {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
    });

    // Map texture on cylinder
    new THREE.TextureLoader().load('map-base.jpg', tex => {
        tex.wrapS = THREE.RepeatWrapping;
        tex.offset.x = X_WORLD_MIN / CANVAS_W;
        tex.repeat.x = X_WORLD_RANGE / CANVAS_W;
        scene.add(new THREE.Mesh(
            new THREE.CylinderGeometry(CYL_RADIUS, CYL_RADIUS, CYL_HEIGHT, 128, 1, true),
            new THREE.MeshBasicMaterial({ map: tex, side: THREE.FrontSide })
        ));
    });

    // Caps
    [CYL_HEIGHT / 2, -CYL_HEIGHT / 2].forEach(y => {
        const cap = new THREE.Mesh(
            new THREE.CircleGeometry(CYL_RADIUS, 128),
            new THREE.MeshBasicMaterial({ color: 0x0e0e16, side: THREE.DoubleSide })
        );
        cap.rotation.x = Math.PI / 2;
        cap.position.y = y;
        scene.add(cap);
    });

    // Camera follow state (closure variables shared by updateCamera + drag + setters)
    let autoTheta = 0, camY = 0, targetCamY = 0, userThetaOff = 0, camDist = CYL_RADIUS * 5.5;
    const DEAD_ZONE_3D = 0.35, LERP_THETA = 0.05, LERP_Y = 0.08;

    function deadZoneH() { return camDist * Math.tan(CAM_FOV / 2 * Math.PI / 180) * DEAD_ZONE_3D; }

    function updateCamera() {
        if (!cyl || !cyl.indicator) return;
        const autoFollow = document.getElementById('autoScroll').checked;
        const dot = cyl.indicator.position;
        if (autoFollow) {
            let dθ = Math.atan2(dot.x, dot.z) - autoTheta;
            while (dθ >  Math.PI) dθ -= 2 * Math.PI;
            while (dθ < -Math.PI) dθ += 2 * Math.PI;
            autoTheta += dθ * LERP_THETA;
            const dz = deadZoneH();
            if      (dot.y > camY + dz) targetCamY = dot.y - dz;
            else if (dot.y < camY - dz) targetCamY = dot.y + dz;
        }
        camY += (targetCamY - camY) * LERP_Y;
        const camTheta = autoTheta + userThetaOff;
        camera.position.set(Math.sin(camTheta) * camDist, camY, Math.cos(camTheta) * camDist);
        camera.lookAt(0, camY, 0);
    }

    // 3D drag (rotate + vertical pan) — disables auto-follow
    let dragging3d = false, drag3dX0 = 0, drag3dY0 = 0, dragOff0 = 0, dragCamY0 = 0;
    renderer.domElement.addEventListener('mousedown', e => {
        dragging3d = true;
        drag3dX0 = e.clientX; drag3dY0 = e.clientY;
        dragOff0 = userThetaOff; dragCamY0 = targetCamY;
        document.getElementById('autoScroll').checked = false;
    });
    document.addEventListener('mouseup',   () => dragging3d = false);
    document.addEventListener('mousemove', e => {
        if (!dragging3d || !cylMode) return;
        userThetaOff = dragOff0 - (e.clientX - drag3dX0) * 0.006;
        targetCamY   = Math.max(-CYL_HEIGHT / 2, Math.min(CYL_HEIGHT / 2,
            dragCamY0 + (e.clientY - drag3dY0) * (CYL_HEIGHT / innerHeight) * 0.3));
    });
    renderer.domElement.addEventListener('wheel', e => {
        camDist = Math.max(CYL_RADIUS * 3.5, Math.min(CYL_RADIUS * 9, camDist + e.deltaY * 0.02));
        e.preventDefault();
    }, { passive: false });

    // Disc orientation helpers
    const _up   = new THREE.Vector3(0, 1, 0);
    const _quat = new THREE.Quaternion();
    const _rad  = new THREE.Vector3();

    cyl = {
        scene, camera, renderer,
        pos3D: null, dotMesh: null, indicator: null,
        _up, _quat, _rad,
        updateCamera,
        // Expose camera state to outside code via closure setters
        snapCamera(theta, y) { autoTheta = theta; camY = y; targetCamY = y; },
    };
}

function buildPath3D() {
    const { scene, _up, _quat, _rad } = cyl;
    const n = coords.length;
    const pos3D = new Float32Array(n * 3);

    for (let i = 0; i < n; i++) {
        const [cx, cy] = normalize(coords[i]);
        const [x, y, z] = canvasTo3D(cx, cy);
        pos3D[i*3] = x; pos3D[i*3+1] = y; pos3D[i*3+2] = z;
    }
    cyl.pos3D = pos3D;

    if (cyl.dotMesh) { scene.remove(cyl.dotMesh); cyl.dotMesh = null; }

    const sGeo = new THREE.CylinderGeometry(TRAIL_R, TRAIL_R, 0.004, 16);
    const sMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const dotMesh = new THREE.InstancedMesh(sGeo, sMat, n);

    const GRID_RES = 10, LAYER_STRENGTH = 0.03, MAX_OVERLAP = 25;
    const base = new THREE.Color(0x9b1206);
    const cellCounter = new Map();
    const mtx = new THREE.Matrix4();

    for (let i = 0; i < n; i++) {
        const [cx, cy] = normalize(coords[i]);
        const key = `${Math.round(cx / GRID_RES)},${Math.round(cy / GRID_RES)}`;
        const cnt = Math.min((cellCounter.get(key) || 0) + 1, MAX_OVERLAP);
        cellCounter.set(key, cnt);

        const b = Math.pow(1 - LAYER_STRENGTH, cnt - 1);
        dotMesh.setColorAt(i, new THREE.Color(base.r * b, base.g * b, base.b * b));

        const raise = DOT_RAISE + (cnt - 1) * LAYER_STEP;
        const [rx, ry, rz] = raisePoint(pos3D[i*3], pos3D[i*3+1], pos3D[i*3+2], raise);
        _rad.set(pos3D[i*3], 0, pos3D[i*3+2]).normalize();
        _quat.setFromUnitVectors(_up, _rad);
        mtx.makeRotationFromQuaternion(_quat);
        mtx.setPosition(rx, ry, rz);
        dotMesh.setMatrixAt(i, mtx);
    }
    dotMesh.instanceMatrix.needsUpdate = true;
    dotMesh.instanceColor.needsUpdate = true;
    dotMesh.count = 0;
    scene.add(dotMesh);
    cyl.dotMesh = dotMesh;

    if (cyl.indicator) { scene.remove(cyl.indicator); }
    cyl.indicator = new THREE.Mesh(
        new THREE.CylinderGeometry(IND_R, IND_R, 0.06, 20),
        new THREE.MeshBasicMaterial({ color: 0x6c0d04 })   // slightly darker than trail base
    );
    scene.add(cyl.indicator);
}

function showDotsUpTo3D(idx) {
    if (cyl && cyl.dotMesh) cyl.dotMesh.count = Math.min(idx + 1, coords.length);
}

function moveIndicator3D() {
    if (!cyl || !cyl.indicator || !cyl.pos3D || currentIdx <= 0) return;
    const { pos3D, _up, _quat, _rad } = cyl;
    const i0 = Math.min(currentIdx,     coords.length - 1);
    const i1 = Math.min(currentIdx + 1, coords.length - 1);
    const [cx0] = normalize(coords[i0]);
    const [cx1] = normalize(coords[i1]);
    const t = Math.abs(cx1 - cx0) > 1000 ? 0 : ptsAccum;
    const x = pos3D[i0*3]   + (pos3D[i1*3]   - pos3D[i0*3])   * t;
    const y = pos3D[i0*3+1] + (pos3D[i1*3+1] - pos3D[i0*3+1]) * t;
    const z = pos3D[i0*3+2] + (pos3D[i1*3+2] - pos3D[i0*3+2]) * t;
    const [rx, ry, rz] = raisePoint(x, y, z, IND_RAISE);
    cyl.indicator.position.set(rx, ry, rz);
    _rad.set(x, 0, z).normalize();
    cyl.indicator.quaternion.setFromUnitVectors(_up, _rad);
}

// 3D render loop — runs continuously whenever cylMode is active
let cylRafRunning = false;
function cyl3DLoop(ts) {
    if (!cylMode) { cylRafRunning = false; return; }
    requestAnimationFrame(cyl3DLoop);

    if (animating) {
        if (lastTs === null) lastTs = ts;
        const dt = Math.min(ts - lastTs, 100);
        lastTs = ts;
        ptsAccum += speed * dt / 1000;
        const n = Math.floor(ptsAccum);
        ptsAccum -= n;
        if (n > 0) {
            currentIdx = Math.min(currentIdx + n, coords.length);
            showDotsUpTo3D(currentIdx);
        }
        if (currentIdx >= coords.length) {
            animating = false;
            playPauseBtn.textContent = '▶ Play';
        }
        moveIndicator3D();
        updateUI();
    }

    if (cyl) {
        cyl.updateCamera();
        cyl.renderer.render(cyl.scene, cyl.camera);
    }
}

// ═══════════════════════════════════════════════════════════════════════════
// Mode switch
// ═══════════════════════════════════════════════════════════════════════════
function switchMode(to3D) {
    const wasAnimating = animating;
    pause();
    cylMode = to3D;

    document.getElementById('viewer').style.display         = to3D ? 'none'  : 'block';
    document.getElementById('view-3d').style.display        = to3D ? 'block' : 'none';
    document.getElementById('annotationsRow').style.display = to3D ? 'none' : '';
    document.body.style.overflow = to3D ? 'hidden' : '';

    if (to3D) {
        if (!cyl) initCylinder();
        if (coords.length > 0) {
            buildPath3D();
            showDotsUpTo3D(currentIdx);
            moveIndicator3D();
            if (cyl.indicator) {
                const p = cyl.indicator.position;
                cyl.snapCamera(Math.atan2(p.x, p.z), p.y);
            }
        }
        if (!cylRafRunning) { cylRafRunning = true; requestAnimationFrame(cyl3DLoop); }
    } else {
        // Rebuild 2D from current state
        clearCanvas();
        batchDraw(0, currentIdx);
        drawDot(currentIdx);
        if (coords.length > 0) {
            const [, y] = normalize(coords[Math.max(0, currentIdx - 1)]);
            window.scrollTo({ top: y * displayScale() - window.innerHeight / 2 });
        }
    }

    updateUI();
    if (wasAnimating) play();
}

// ═══════════════════════════════════════════════════════════════════════════
// Unified play / pause / replay / scrubTo
// ═══════════════════════════════════════════════════════════════════════════
function play() {
    if (currentIdx >= coords.length) currentIdx = 0;
    animating = true; ptsAccum = 0; lastTs = null;
    playPauseBtn.textContent = '⏸ Pause';
    if (!cylMode) rafId = requestAnimationFrame(animFrame);
    // 3D loop is already running when cylMode; it picks up animating=true on next tick
}

function pause() {
    animating = false;
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    lastTs = null;
    playPauseBtn.textContent = '▶ Play';
}

function replay() {
    pause();
    currentIdx = 0;
    if (!cylMode) {
        clearCanvas();
        oCtx.clearRect(0, 0, CANVAS_W, CANVAS_H);
        targetScrollY = null;
        if (coords.length > 0) {
            const [, y] = normalize(coords[0]);
            window.scrollTo({ top: y * displayScale() - window.innerHeight / 2 });
        }
    } else {
        showDotsUpTo3D(0);
    }
    updateUI();
    play();
}

function scrubTo(fraction) {
    pause();
    const target = Math.floor(fraction * coords.length);
    if (!cylMode) {
        clearCanvas();
        oCtx.clearRect(0, 0, CANVAS_W, CANVAS_H);
        currentIdx = 0;
        batchDraw(0, target);
        currentIdx = target;
        drawDot(currentIdx);
    } else {
        currentIdx = target;
        showDotsUpTo3D(currentIdx);
        moveIndicator3D();
    }
    updateUI();
}

// ═══════════════════════════════════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════════════════════════════════
const playPauseBtn  = document.getElementById('playPauseBtn');
const progressRange = document.getElementById('progress-range');
const progressLabel = document.getElementById('progress-label');
const statusEl      = document.getElementById('status');

function updateUI() {
    const n = coords.length;
    progressRange.value = n > 0 ? Math.round((currentIdx / n) * 10000) : 0;
    progressLabel.textContent = `${currentIdx.toLocaleString()} / ${n.toLocaleString()}`;
    statusEl.textContent = !animating
        ? (n === 0 ? 'Load a .sav file to begin'
            : currentIdx >= n ? 'Finished!'
            : currentIdx === 0 ? `${n.toLocaleString()} points loaded. Press Play!`
            : 'Paused')
        : `Playing… ${fmtMult(speed)} real-time · ${fmtEta(speed, n - currentIdx)} left`;
}

// ═══════════════════════════════════════════════════════════════════════════
// Load coords (handles both modes)
// ═══════════════════════════════════════════════════════════════════════════
function loadCoords(newCoords, startFromHalf = false) {
    pause();
    coords = newCoords;
    const mid = startFromHalf ? Math.min(11600, coords.length - 1) : 0;
    currentIdx = mid;

    if (!cylMode) {
        clearCanvas();
        oCtx.clearRect(0, 0, CANVAS_W, CANVAS_H);
        if (mid > 0) batchDraw(0, mid);
        if (coords.length > 0) {
            const [, y] = normalize(coords[Math.max(0, mid)]);
            window.scrollTo({ top: y * displayScale() - window.innerHeight / 2 });
        }
    } else {
        buildPath3D();
        showDotsUpTo3D(mid);
        moveIndicator3D();
        if (cyl && cyl.indicator) {
            const p = cyl.indicator.position;
            cyl.snapCamera(Math.atan2(p.x, p.z), p.y);
        }
    }

    playPauseBtn.disabled = false;
    progressRange.disabled = false;
    updateUI();
    play();
}

// ── Auto-load & file input ─────────────────────────────────────────────────
fetch('path0_0.sav')
    .then(r => r.arrayBuffer())
    .then(buf => loadCoords(parseSavBuffer(buf), true))
    .catch(() => { statusEl.textContent = 'Load a .sav file to begin'; });

document.getElementById('pathInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => loadCoords(parseSavBuffer(ev.target.result), false);
    reader.readAsArrayBuffer(file);
});

// ── Controls ───────────────────────────────────────────────────────────────
playPauseBtn.addEventListener('click', () => animating ? pause() : play());

document.getElementById('speed-range').addEventListener('input', function() {
    speed = sliderToSpeed(+this.value);
    document.getElementById('speedLabel').textContent = fmtMult(speed) + ' real-time';
});

document.getElementById('annotationsToggle').addEventListener('change', function() {
    showAnnotations = this.checked;
    if (!cylMode && coords.length > 0) {
        const wasAnimating = animating;
        pause();
        clearCanvas();
        oCtx.clearRect(0, 0, CANVAS_W, CANVAS_H);
        batchDraw(0, currentIdx);
        drawDot(currentIdx);
        if (wasAnimating) play();
    }
});

progressRange.addEventListener('mousedown', () => pause());
progressRange.addEventListener('input', function() {
    if (coords.length === 0) return;
    scrubTo(this.value / 10000);
});

document.getElementById('cylinderToggle').addEventListener('change', function() {
    switchMode(this.checked);
});

// ── Modal ──────────────────────────────────────────────────────────────────
function closeSavModal() {
    document.getElementById('sav-modal-overlay').classList.remove('show');
}
document.getElementById('loadSavBtn').addEventListener('click', () => {
    document.getElementById('sav-modal-overlay').classList.add('show');
});
document.getElementById('modalBrowseBtn').addEventListener('click', () => {
    closeSavModal();
    document.getElementById('pathInput').click();
});
document.getElementById('copyPathBtn').addEventListener('click', function() {
    navigator.clipboard.writeText('%USERPROFILE%\\AppData\\LocalLow\\DefaultCompany\\BabySteps');
    const orig = this.textContent;
    this.textContent = '✓ Copied!';
    setTimeout(() => this.textContent = orig, 1500);
});
</script>
