<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Baby Steps - 3D Path</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #111; overflow: hidden; font-family: monospace; color: #ddd; }

        #controls {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            z-index: 100;
            background: rgba(15,15,25,0.92);
            border-top: 1px solid #333;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 18px;
            flex-wrap: wrap;
            backdrop-filter: blur(4px);
        }

        .btn {
            background: #c4509a; color: #fff; border: none;
            padding: 6px 18px; font-family: monospace; font-size: 14px;
            font-weight: bold; cursor: pointer; border-radius: 3px;
        }
        .btn:hover:not(:disabled) { background: #e060b0; }
        .btn:disabled { background: #333; color: #666; cursor: default; }

        .group { display: flex; flex-direction: column; gap: 3px; }
        .group label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.08em; }
        input[type=range] { accent-color: #ff76c6; cursor: pointer; }
        #speed-range { width: 100px; }
        #progress-range { flex: 1; height: 6px; }

        #row-progress { display: flex; align-items: center; gap: 10px; width: 100%; }

        #status { font-size: 11px; color: #777; }

        #sav-modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.6); z-index: 200;
            align-items: center; justify-content: center;
        }
        #sav-modal-overlay.show { display: flex; }
        #sav-modal {
            background: #1a1a2e; border: 1px solid #444; border-radius: 6px;
            padding: 28px 32px; max-width: 480px; width: 90%;
            color: #ddd; font-family: monospace;
        }
        #sav-modal h2 { color: #ff76c6; font-size: 16px; margin-bottom: 16px; }
        #sav-modal ol { padding-left: 20px; line-height: 2; font-size: 13px; }
        #sav-modal code { color: #aaa; background: #111; padding: 1px 5px; border-radius: 3px; }
        .copy-path {
            background: none; border: none; color: #ff76c6; font-size: 12px;
            font-family: monospace; cursor: pointer; padding: 0;
            text-decoration: underline dotted; display: inline;
        }
        .copy-path:hover { color: #ff9ad6; }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .btn-cancel { background: #333; color: #aaa; }
        .btn-cancel:hover { background: #444; color: #ccc; }

        #back-link, #repo-link {
            position: fixed; z-index: 101;
            font-size: 11px; color: #444; text-decoration: none; font-family: monospace;
        }
        #back-link { top: 10px; left: 12px; }
        #repo-link  { top: 10px; right: 12px; }
        #back-link:hover, #repo-link:hover { color: #888; }
    </style>
</head>
<body>

<a id="back-link" href="index.html">← 2D</a>
<a id="repo-link" href="https://github.com/chopchump/babysteps_credits_map" target="_blank">source</a>

<div id="controls">
    <div class="group">
        <label>Load your own path</label>
        <button class="btn" id="loadSavBtn">Choose file…</button>
        <input type="file" id="pathInput" accept=".sav" style="display:none">
    </div>

    <button class="btn" id="playPauseBtn" disabled>▶ Play</button>
    <button class="btn" id="replayBtn"    disabled>↺ Replay</button>

    <div class="group">
        <label>Speed: <span id="speedLabel">100× real-time</span></label>
        <input type="range" id="speed-range" min="1" max="100" value="67">
    </div>

    <div id="status">Loading…</div>

    <div id="row-progress">
        <span style="font-size: 11px; color: #666; white-space:nowrap;">Progress</span>
        <input type="range" id="progress-range" min="0" max="10000" value="0" step="1" disabled>
        <span id="progress-label" style="font-size: 11px; color: #666; white-space:nowrap; min-width: 100px; text-align: right;">0 / 0</span>
    </div>
</div>

<div id="sav-modal-overlay" onclick="closeSavModal()">
    <div id="sav-modal" onclick="event.stopPropagation()">
        <h2>Where to find your path file on PC</h2>
        <ol>
            <li>Open this folder:<br>
                <button class="copy-path" id="copyPathBtn">📋 %USERPROFILE%\AppData\LocalLow\DefaultCompany\BabySteps</button>
            </li>
            <li>Open the numbered folder inside (your Steam ID)</li>
            <li>Open the <code>save</code> folder</li>
            <li>Pick file according to your save slot:<br>
                <code>path0_0.sav</code> · <code>path1_0.sav</code> · <code>path2_0.sav</code>
            </li>
        </ol>
        <div class="modal-btns">
            <button class="btn" id="modalBrowseBtn">Browse for file</button>
            <button class="btn btn-cancel" onclick="closeSavModal()">Cancel</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── Coordinate constants (match 2D viewer exactly) ─────────────────────────
const COEFF     = 1.3250;
const X_PAD     = 150;
const Y_PAD     = 180;
const CANVAS_W  = 2048;
const CANVAS_H  = 12288;

// ── World x bounds (derived from coordinate constants) ────────────────────
// raw_x wraps at 32768; canvas x = raw_x * 1.005 * COEFF/25 + X_PAD
const WORLD_WRAP    = 32768;
const X_WORLD_MIN   = X_PAD;                                    // canvas x at raw_x=0
const X_WORLD_RANGE = WORLD_WRAP * 1.005 * COEFF / 25;          // world width in canvas px ≈ 1745

// ── Cylinder dimensions ────────────────────────────────────────────────────
const CYL_RADIUS = 5;
// Height proportional to the actual world width (not the full padded canvas)
const CYL_HEIGHT = CYL_RADIUS * 2 * Math.PI * (CANVAS_H / X_WORLD_RANGE);

// ── Speed ──────────────────────────────────────────────────────────────────
const SECS_PER_POINT = 5.3;
function sliderToSpeed(v) {
    return Math.pow(1000, (v - 1) / 99) / SECS_PER_POINT;
}
function fmtMult(s) {
    const x = s * SECS_PER_POINT;
    return (x >= 10 ? Math.round(x) : x.toFixed(1)) + '×';
}
function fmtEta(s, rem) {
    if (!rem || !s) return '';
    const t = Math.round(rem / s);
    return t < 60 ? `~${t}s` : t < 3600 ? `~${Math.round(t/60)}min` : `~${(t/3600).toFixed(1)}hr`;
}

// ── Normalise raw save coords → canvas coords ──────────────────────────────
function normalize([rx, ry]) {
    return [
        (rx * 1.005 * COEFF / 25) + X_PAD,
        ((CANVAS_H * 5 - ry * 0.983 * COEFF) / 5) + Y_PAD
    ];
}

// ── Canvas coords → 3-D point on cylinder surface ─────────────────────────
function canvasTo3D(cx, cy) {
    const θ = ((cx - X_WORLD_MIN) / X_WORLD_RANGE) * Math.PI * 2;
    const h = (0.5 - cy / CANVAS_H) * CYL_HEIGHT;
    return [Math.sin(θ) * CYL_RADIUS, h, Math.cos(θ) * CYL_RADIUS];
}

// ── Three.js scene ─────────────────────────────────────────────────────────
const scene    = new THREE.Scene();
scene.background = new THREE.Color(0x0e0e16);
scene.fog      = new THREE.Fog(0x0e0e16, CYL_RADIUS * 12, CYL_RADIUS * 20);

const CAM_FOV  = 45;
const camera   = new THREE.PerspectiveCamera(CAM_FOV, innerWidth / innerHeight, 0.01, 500);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(devicePixelRatio);
renderer.setSize(innerWidth, innerHeight);
document.body.insertBefore(renderer.domElement, document.getElementById('controls'));
renderer.domElement.style.position = 'fixed';
renderer.domElement.style.inset = '0';

window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});

// ── Custom camera controller ───────────────────────────────────────────────
const DEAD_ZONE  = 0.35;
const LERP_THETA = 0.05;
const LERP_Y     = 0.08;

let autoTheta    = 0;   // smoothly-lerped auto-follow angle (shortest-path)
let camY         = 0;   // current camera height
let targetCamY   = 0;
let userThetaOff = 0;   // immediate drag offset — NOT lerped
let camDist      = CYL_RADIUS * 3.0;

function deadZoneH() {
    return camDist * Math.tan(CAM_FOV / 2 * Math.PI / 180) * DEAD_ZONE;
}

function updateCamera() {
    if (!indicator) return;
    const dot = indicator.position;

    // Auto-follow θ with shortest-path lerp (avoids spinning at the ±π seam)
    const dotTheta = Math.atan2(dot.x, dot.z);
    let dθ = dotTheta - autoTheta;
    while (dθ >  Math.PI) dθ -= 2 * Math.PI;
    while (dθ < -Math.PI) dθ += 2 * Math.PI;
    autoTheta += dθ * LERP_THETA;

    // User drag is applied directly on top — no lerp, feels like turning the cylinder
    const camTheta = autoTheta + userThetaOff;

    // Y dead zone
    const dz = deadZoneH();
    if      (dot.y > camY + dz) targetCamY = dot.y - dz;
    else if (dot.y < camY - dz) targetCamY = dot.y + dz;
    camY += (targetCamY - camY) * LERP_Y;

    camera.position.set(
        Math.sin(camTheta) * camDist,
        camY,
        Math.cos(camTheta) * camDist
    );
    camera.lookAt(0, camY, 0);
}

// Drag to rotate (immediate — no lerp)
let dragging = false, dragX0 = 0, dragY0 = 0, dragOff0 = 0, dragCamY0 = 0;
renderer.domElement.addEventListener('mousedown', e => {
    dragging = true;
    dragX0 = e.clientX; dragY0 = e.clientY;
    dragOff0 = userThetaOff; dragCamY0 = targetCamY;
});
document.addEventListener('mouseup',   () => dragging = false);
document.addEventListener('mousemove', e => {
    if (!dragging) return;
    userThetaOff = dragOff0 - (e.clientX - dragX0) * 0.006;
    targetCamY   = dragCamY0 + (e.clientY - dragY0) * (CYL_HEIGHT / innerHeight);
});

// Scroll to zoom
renderer.domElement.addEventListener('wheel', e => {
    camDist = Math.max(CYL_RADIUS * 1.1,
                       Math.min(CYL_RADIUS * 7, camDist + e.deltaY * 0.02));
    e.preventDefault();
}, { passive: false });

// ── Cylinder map background ────────────────────────────────────────────────
new THREE.TextureLoader().load('map-base.jpg', tex => {
    tex.wrapS = THREE.RepeatWrapping;
    tex.offset.x = X_WORLD_MIN / CANVAS_W;
    tex.repeat.x = X_WORLD_RANGE / CANVAS_W;
    const geo = new THREE.CylinderGeometry(CYL_RADIUS, CYL_RADIUS, CYL_HEIGHT, 128, 1, true);
    scene.add(new THREE.Mesh(geo, new THREE.MeshBasicMaterial({
        map: tex, side: THREE.FrontSide
    })));
});

// ── Top & bottom caps (dark discs to close the tube visually) ─────────────
[CYL_HEIGHT / 2, -CYL_HEIGHT / 2].forEach(y => {
    const cap = new THREE.Mesh(
        new THREE.CircleGeometry(CYL_RADIUS, 128),
        new THREE.MeshBasicMaterial({ color: 0x0e0e16, side: THREE.DoubleSide })
    );
    cap.rotation.x = Math.PI / 2;
    cap.position.y = y;
    scene.add(cap);
});

const DOT_RAISE = 0.01;   // base raise for first layer
const IND_RAISE = 0.25;   // must exceed max trail raise (0.01 + 24×0.008 = 0.202)

// Raise a surface point radially outward
function raisePoint(x, y, z, amount) {
    const scale = (CYL_RADIUS + amount) / CYL_RADIUS;
    return [x * scale, y, z * scale];
}

// Reusable rotation helpers — orient each disc radially outward
const _up   = new THREE.Vector3(0, 1, 0);
const _quat = new THREE.Quaternion();
const _rad  = new THREE.Vector3();

// ── Path state ─────────────────────────────────────────────────────────────
let coords    = [];
let pos3D     = null;   // Float32Array (x,y,z) per point — on cylinder surface
let dotMesh   = null;   // THREE.InstancedMesh of spheres
let indicator = null;   // THREE.Mesh sphere (indicator)

let currentIdx = 0;
let animating  = false;
let speed      = sliderToSpeed(67);
let ptsAccum   = 0;
let lastTs     = null;

// ── Build InstancedMesh of spheres from parsed coords ─────────────────────
function buildPath() {
    const n = coords.length;
    pos3D = new Float32Array(n * 3);
    for (let i = 0; i < n; i++) {
        const [cx, cy] = normalize(coords[i]);
        const [x, y, z] = canvasTo3D(cx, cy);
        pos3D[i*3] = x; pos3D[i*3+1] = y; pos3D[i*3+2] = z;
    }

    if (dotMesh) scene.remove(dotMesh);

    // White material — instance colors (set below) provide the actual colour
    const sGeo = new THREE.CylinderGeometry(0.14, 0.14, 0.004, 16);
    const sMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    dotMesh = new THREE.InstancedMesh(sGeo, sMat, n);
    // NOTE: keep count=n here so setColorAt creates a correctly-sized buffer;
    // set to 0 after the loop to hide all instances initially.

    // Each overlapping visit gets its own layer, sitting just above the previous one.
    // Disc height (0.004) < LAYER_STEP (0.008) → zero radial overlap, zero clipping.
    const GRID_RES       = 10;
    const LAYER_STRENGTH = 0.03;
    const LAYER_STEP     = 0.008;  // radial gap between successive layers
    const MAX_OVERLAP    = 25;
    const base = new THREE.Color(0x9b1206);
    const cellCounter = new Map();

    const mtx = new THREE.Matrix4();
    for (let i = 0; i < n; i++) {
        const [cx, cy] = normalize(coords[i]);
        const key = `${Math.round(cx / GRID_RES)},${Math.round(cy / GRID_RES)}`;
        const cnt = Math.min((cellCounter.get(key) || 0) + 1, MAX_OVERLAP);
        cellCounter.set(key, cnt);

        const b = Math.pow(1 - LAYER_STRENGTH, cnt - 1);
        dotMesh.setColorAt(i, new THREE.Color(base.r * b, base.g * b, base.b * b));

        const raise = DOT_RAISE + (cnt - 1) * LAYER_STEP;
        const [rx, ry, rz] = raisePoint(pos3D[i*3], pos3D[i*3+1], pos3D[i*3+2], raise);
        _rad.set(pos3D[i*3], 0, pos3D[i*3+2]).normalize();
        _quat.setFromUnitVectors(_up, _rad);
        mtx.makeRotationFromQuaternion(_quat);
        mtx.setPosition(rx, ry, rz);
        dotMesh.setMatrixAt(i, mtx);
    }
    dotMesh.instanceMatrix.needsUpdate = true;
    dotMesh.instanceColor.needsUpdate = true;
    dotMesh.count = 0;   // hide all initially; animation reveals them
    scene.add(dotMesh);

    // Indicator — slightly larger disc, raised a bit more
    if (indicator) scene.remove(indicator);
    indicator = new THREE.Mesh(
        new THREE.CylinderGeometry(0.32, 0.32, 0.06, 20),
        new THREE.MeshBasicMaterial({ color: 0x9b1206 })
    );
    scene.add(indicator);
}

function showDotsUpTo(idx) {
    if (dotMesh) dotMesh.count = Math.min(idx + 1, coords.length);
}

// Interpolated indicator position, raised above surface (handles seam)
function moveIndicator() {
    if (!indicator || !pos3D || currentIdx <= 0) return;
    const i0 = Math.min(currentIdx,     coords.length - 1);
    const i1 = Math.min(currentIdx + 1, coords.length - 1);
    const [cx0] = normalize(coords[i0]);
    const [cx1] = normalize(coords[i1]);
    const t = Math.abs(cx1 - cx0) > 1000 ? 0 : ptsAccum;
    const x = pos3D[i0*3]   + (pos3D[i1*3]   - pos3D[i0*3])   * t;
    const y = pos3D[i0*3+1] + (pos3D[i1*3+1] - pos3D[i0*3+1]) * t;
    const z = pos3D[i0*3+2] + (pos3D[i1*3+2] - pos3D[i0*3+2]) * t;
    const [rx, ry, rz] = raisePoint(x, y, z, IND_RAISE);
    indicator.position.set(rx, ry, rz);
    _rad.set(x, 0, z).normalize();
    indicator.quaternion.setFromUnitVectors(_up, _rad);
}

// ── Unified render loop ────────────────────────────────────────────────────
function renderLoop(ts) {
    requestAnimationFrame(renderLoop);

    if (animating) {
        if (lastTs === null) lastTs = ts;
        const dt = Math.min(ts - lastTs, 100);
        lastTs = ts;

        ptsAccum += speed * dt / 1000;
        const n = Math.floor(ptsAccum);
        ptsAccum -= n;

        if (n > 0) {
            currentIdx = Math.min(currentIdx + n, coords.length);
            showDotsUpTo(currentIdx);
        }

        if (currentIdx >= coords.length) {
            animating = false;
            playPauseBtn.textContent = '▶ Play';
        }

        moveIndicator();
        updateUI();
    }

    updateCamera();
    renderer.render(scene, camera);
}
requestAnimationFrame(renderLoop);

// ── Playback controls ──────────────────────────────────────────────────────
function play() {
    if (currentIdx >= coords.length) currentIdx = 0;
    animating = true; ptsAccum = 0; lastTs = null;
    playPauseBtn.textContent = '⏸ Pause';
}
function pause() {
    animating = false;
    playPauseBtn.textContent = '▶ Play';
}
function replay() {
    pause();
    currentIdx = 0;
    showDotsUpTo(0);
    updateUI();
    play();
}

// ── Scrub to arbitrary position ────────────────────────────────────────────
function scrubTo(fraction) {
    pause();
    currentIdx = Math.floor(fraction * coords.length);
    showDotsUpTo(currentIdx);
    moveIndicator();
    updateUI();
}

// ── UI ─────────────────────────────────────────────────────────────────────
const playPauseBtn  = document.getElementById('playPauseBtn');
const statusEl      = document.getElementById('status');
const progressRange = document.getElementById('progress-range');
const progressLabel = document.getElementById('progress-label');

function updateUI() {
    const n = coords.length;
    progressRange.value = n > 0 ? Math.round((currentIdx / n) * 10000) : 0;
    progressLabel.textContent = `${currentIdx.toLocaleString()} / ${n.toLocaleString()}`;
    statusEl.textContent = !animating
        ? (n === 0 ? 'Loading…' : currentIdx >= n ? 'Finished!' : currentIdx === 0
            ? `${n.toLocaleString()} points. Press Play!` : 'Paused')
        : `Playing… ${fmtMult(speed)} real-time · ${fmtEta(speed, n - currentIdx)} left`;
}

playPauseBtn.addEventListener('click', () => animating ? pause() : play());
document.getElementById('replayBtn').addEventListener('click',
    () => { if (coords.length) replay(); });
document.getElementById('speed-range').addEventListener('input', function() {
    speed = sliderToSpeed(+this.value);
    document.getElementById('speedLabel').textContent = fmtMult(speed) + ' real-time';
});
progressRange.addEventListener('mousedown', () => pause());
progressRange.addEventListener('input', function() {
    scrubTo(this.value / 10000);
});

// ── Save file parsing & loading ────────────────────────────────────────────
function parseSavBuffer(buf) {
    const arr = new Uint8Array(buf);
    const result = [];
    for (let i = 0; i < arr.length; i += 4) {
        if (arr[i] !== 0) {
            let x = (arr[i+1] << 8) + arr[i];
            if (x > 0x8000) x -= 0x8000;
            result.push([x, (arr[i+3] << 8) + arr[i+2]]);
        }
    }
    return result;
}

function loadNewCoords(newCoords, startFromHalf = false) {
    coords = newCoords;
    buildPath();

    const mid = startFromHalf ? Math.min(11600, coords.length - 1) : 0;
    currentIdx = mid;
    showDotsUpTo(mid);
    moveIndicator();

    if (indicator) {
        camY = indicator.position.y;
        targetCamY = camY;
        autoTheta = Math.atan2(indicator.position.x, indicator.position.z);
        updateCamera();
    }

    playPauseBtn.disabled = false;
    document.getElementById('replayBtn').disabled = false;
    progressRange.disabled = false;
    updateUI();
    play();
}

fetch('path0_0.sav')
    .then(r => r.arrayBuffer())
    .then(buf => loadNewCoords(parseSavBuffer(buf), true))
    .catch(() => { statusEl.textContent = 'Failed to load path file'; });

// Manual file override
document.getElementById('pathInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => loadNewCoords(parseSavBuffer(ev.target.result), false);
    reader.readAsArrayBuffer(file);
});

// Modal
function closeSavModal() {
    document.getElementById('sav-modal-overlay').classList.remove('show');
}
document.getElementById('loadSavBtn').addEventListener('click', () => {
    document.getElementById('sav-modal-overlay').classList.add('show');
});
document.getElementById('modalBrowseBtn').addEventListener('click', () => {
    closeSavModal();
    document.getElementById('pathInput').click();
});
document.getElementById('copyPathBtn').addEventListener('click', function() {
    navigator.clipboard.writeText('%USERPROFILE%\\AppData\\LocalLow\\DefaultCompany\\BabySteps');
    const orig = this.textContent;
    this.textContent = '✓ Copied!';
    setTimeout(() => this.textContent = orig, 1500);
});
</script>
</body>
</html>
